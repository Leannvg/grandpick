<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>GrandPick</title>
    <meta name="description" content="Descripción breve del sitio.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Akshar:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/styles/globals.css">
    <link rel="stylesheet" href="styles/styles/components.css">
</head>

<body>
    <!-- NAVBAR (ejemplo placeholder, podés borrar) -->
    <nav class="navbar navbar-expand-lg" style="background-color: var(--color-dark-blue);">
        <div class="container">
            <a class="navbar-brand text-white" href="#">Mi Marca</a>
        </div>
    </nav>
    <main>
        <section class="auth-section page-section container text-center">
            <div class="auth-container">
                <header class="page-header">
                    <p class="section-label">¡Luces encendidas!</p>
                    <h1 class="section-title">BIENVENIDO/A</h1>
                    <p class="section-subtitle">
                        El semáforo está en rojo...por ahora
                    </p>
                </header>

                <form class="auth-form">

                    <div class="input-group">
                        <span class="input-label">Email</span>
                        <input type="email" placeholder="juan@perez">
                    </div>

                    <div class="input-group">
                        <span class="input-label">Contraseña</span>
                        <input type="password" placeholder="123456">
                    </div>

                    <button class="submit-btn" aria-label="Crear cuenta">
                        <svg class="icon-submit" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                        </svg>
                    </button>


                </form>

            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="py-4 mt-5 text-center" style="background-color: var(--color-footer); color: #fff;">
        <p>© 2025 Mi Sitio Web</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>
</body>
