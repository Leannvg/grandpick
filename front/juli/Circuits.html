<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">

  <title>GrandPick</title>
  <meta name="description" content="Descripción breve del sitio.">

  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <!-- NAVBAR (ejemplo placeholder, podés borrar) -->
  <nav class="navbar navbar-expand-lg" style="background-color: var(--color-dark-blue);">
    <div class="container">

    </div>
  </nav>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <section class="circuits-section page-section container text-center">
      <header class="page-header">
        <p class="section-label">Los templos de la velocidad</p>
        <h1 class="section-title">CIRCUITOS</h1>
        <p class="section-subtitle">
          Cada pista, un desafio distinto
        </p>
      </header>
      <div class="container">
        <article class="circuit-card">
          <div class="circuit-info">
            <h3 class="circuit-name">CIRCUITO DE SILVERSTONE</h3>

            <div class="circuit-country">
              <img src="img/belgica.png" alt="Belgica">
              <span>Bélgica</span>
            </div>
          </div>

          <div class="circuit-length">
            <span class="length-value">4.123 km</span>
            <span class="length-label">Longitud</span>
          </div>
        </article>

        <article class="circuit-card">
          <div class="circuit-info">
            <h3 class="circuit-name">CIRCUITO DE SPA-FRANCORCHAMPS</h3>

            <div class="circuit-country">
              <img src="img/belgica.png" alt="Bélgica">
              <span>Bélgica</span>
            </div>
          </div>

          <div class="circuit-length">
            <span class="length-value">5.807 km</span>
            <span class="length-label">Longitud</span>
          </div>
        </article>

        <article class="circuit-card">
          <div class="circuit-info">
            <h3 class="circuit-name">CIRCUITO DE SPA-FRANCORCHAMPS</h3>

            <div class="circuit-country">
              <img src="img/belgica.png" alt="Bélgica">
              <span>Bélgica</span>
            </div>
          </div>

          <div class="circuit-length">
            <span class="length-value">5.807 km</span>
            <span class="length-label">Longitud</span>
          </div>
        </article>

        <!-- Repetís cards -->

      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="py-4 mt-5 text-center" style="background-color: var(--color-footer); color: #fff;">
    <p>© 2025 Mi Sitio Web</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
